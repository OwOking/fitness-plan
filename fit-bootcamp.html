<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="theme-color" content="#2f7d5c">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="减脂训练">
  <title>4周减脂日历训练台</title>
  <style>
    :root {
      --bg: #f5f6f2;
      --panel: #ffffff;
      --ink: #1f2933;
      --muted: #667085;
      --line: #dde3dc;
      --green: #2f7d5c;
      --green-soft: #e7f2ec;
      --blue: #315a8c;
      --blue-soft: #e8eef7;
      --orange: #d97706;
      --orange-soft: #fff4df;
      --red: #b42318;
      --red-soft: #fff1f0;
      --shadow: 0 12px 30px rgba(31, 41, 51, 0.08);
    }

    * {
      box-sizing: border-box;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      margin: 0;
      color: var(--ink);
      background: var(--bg);
      font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Helvetica Neue", Arial, sans-serif;
      line-height: 1.52;
    }

    button,
    input,
    textarea {
      font: inherit;
    }

    .topbar {
      position: sticky;
      top: 0;
      z-index: 20;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      padding: 14px clamp(14px, 4vw, 38px);
      border-bottom: 1px solid rgba(221, 227, 220, 0.9);
      background: rgba(245, 246, 242, 0.94);
      backdrop-filter: blur(14px);
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 10px;
      min-width: 0;
    }

    .brand-mark {
      display: grid;
      place-items: center;
      width: 36px;
      height: 36px;
      border-radius: 8px;
      color: #fff;
      background: var(--green);
      font-weight: 900;
    }

    .brand h1 {
      margin: 0;
      font-size: 18px;
      line-height: 1.2;
      letter-spacing: 0;
    }

    .brand p {
      margin: 2px 0 0;
      color: var(--muted);
      font-size: 12px;
    }

    .top-actions {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    .button,
    .date-button,
    .exercise-button {
      border: 1px solid var(--line);
      border-radius: 8px;
      color: var(--ink);
      background: var(--panel);
      cursor: pointer;
    }

    .button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 36px;
      padding: 8px 12px;
      font-size: 14px;
      font-weight: 800;
      text-decoration: none;
      white-space: nowrap;
    }

    .button.primary {
      border-color: var(--green);
      color: #fff;
      background: var(--green);
    }

    .button.warn {
      border-color: #ffd0c9;
      color: var(--red);
      background: var(--red-soft);
    }

    .button:focus-visible,
    .date-button:focus-visible,
    .exercise-button:focus-visible,
    input:focus-visible,
    textarea:focus-visible {
      outline: 3px solid rgba(49, 90, 140, 0.24);
      outline-offset: 2px;
    }

    main {
      width: min(1220px, calc(100% - 28px));
      margin: 0 auto;
      padding: 18px 0 48px;
    }

    .layout {
      display: grid;
      grid-template-columns: 370px minmax(0, 1fr);
      gap: 16px;
      align-items: start;
    }

    .layout > * {
      min-width: 0;
    }

    .panel {
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel);
      box-shadow: var(--shadow);
    }

    .calendar-panel {
      position: sticky;
      top: 82px;
      overflow: hidden;
      padding: 16px;
    }

    .panel-title {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 10px;
      margin-bottom: 14px;
    }

    .panel-title h2 {
      margin: 0;
      font-size: 20px;
      line-height: 1.25;
      letter-spacing: 0;
    }

    .panel-title p {
      margin: 5px 0 0;
      color: var(--muted);
      font-size: 13px;
    }

    .calendar-grid {
      display: grid;
      grid-template-columns: repeat(7, minmax(0, 1fr));
      gap: 6px;
      max-width: 100%;
    }

    .weekday {
      color: var(--muted);
      font-size: 12px;
      font-weight: 800;
      text-align: center;
    }

    .date-button {
      position: relative;
      min-height: 56px;
      padding: 7px 5px;
      text-align: left;
    }

    .date-button strong {
      display: block;
      font-size: 15px;
      line-height: 1;
    }

    .date-button span {
      display: block;
      margin-top: 6px;
      overflow: hidden;
      color: var(--muted);
      font-size: 11px;
      font-weight: 800;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .date-button.today::after {
      position: absolute;
      top: 6px;
      right: 6px;
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: var(--orange);
      content: "";
    }

    .date-button.selected {
      border-color: var(--green);
      color: var(--green);
      background: var(--green-soft);
    }

    .date-button.done {
      border-color: #b9dec9;
    }

    .date-button.done span::before {
      content: "已完成 · ";
    }

    .calendar-legend {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-top: 12px;
      color: var(--muted);
      font-size: 12px;
      font-weight: 700;
    }

    .legend-dot {
      display: inline-flex;
      align-items: center;
      gap: 5px;
    }

    .legend-dot::before {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--green);
      content: "";
    }

    .legend-dot.rest::before {
      background: var(--orange);
    }

    .day-panel {
      padding: clamp(16px, 3vw, 24px);
    }

    .day-header {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 16px;
      align-items: start;
      padding-bottom: 16px;
      border-bottom: 1px solid var(--line);
    }

    .date-kicker {
      margin: 0 0 6px;
      color: var(--green);
      font-size: 13px;
      font-weight: 900;
    }

    .day-header h2 {
      margin: 0;
      font-size: clamp(28px, 4vw, 42px);
      line-height: 1.05;
      letter-spacing: 0;
    }

    .day-header p {
      margin: 10px 0 0;
      color: var(--muted);
      font-size: 15px;
    }

    .status-card {
      min-width: 220px;
      padding: 14px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fbfcfa;
    }

    .status-card label {
      display: flex;
      align-items: center;
      gap: 9px;
      font-weight: 900;
    }

    .status-card input {
      width: 19px;
      height: 19px;
      accent-color: var(--green);
    }

    .status-card p {
      margin: 9px 0 0;
      color: var(--muted);
      font-size: 13px;
    }

    .daily-grid {
      display: grid;
      grid-template-columns: 1fr 1.2fr;
      gap: 14px;
      margin-top: 16px;
    }

    .subpanel {
      min-width: 0;
      padding: 16px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fbfcfa;
    }

    .subpanel h3 {
      margin: 0 0 10px;
      font-size: 18px;
      letter-spacing: 0;
    }

    .food-list,
    .compact-list {
      display: grid;
      gap: 8px;
      margin: 0;
      padding: 0;
      list-style: none;
    }

    .food-list li,
    .compact-list li {
      padding: 10px 11px;
      border-radius: 8px;
      background: #fff;
      color: var(--muted);
      font-size: 14px;
    }

    .food-list strong,
    .compact-list strong {
      color: var(--ink);
    }

    .exercise-list {
      display: grid;
      gap: 8px;
    }

    .exercise-button {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 12px;
      align-items: center;
      width: 100%;
      padding: 11px 12px;
      text-align: left;
    }

    .exercise-button strong {
      display: block;
      font-size: 15px;
    }

    .exercise-button span {
      display: block;
      margin-top: 3px;
      color: var(--muted);
      font-size: 13px;
    }

    .exercise-button .sets {
      padding: 5px 8px;
      border-radius: 999px;
      color: var(--blue);
      background: var(--blue-soft);
      font-size: 12px;
      font-weight: 900;
      white-space: nowrap;
    }

    .exercise-item {
      display: grid;
      gap: 7px;
      padding: 8px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fff;
    }

    .exercise-item .exercise-button {
      border: 0;
      padding: 4px;
      background: transparent;
    }

    .status-chips {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 6px;
    }

    .status-chip {
      min-height: 34px;
      border: 1px solid var(--line);
      border-radius: 8px;
      color: var(--muted);
      background: #f7f8f5;
      font-size: 12px;
      font-weight: 900;
      cursor: pointer;
    }

    .status-chip[data-status="done"].active {
      border-color: #b9dec9;
      color: var(--green);
      background: var(--green-soft);
    }

    .status-chip[data-status="skip"].active {
      border-color: #f5d08a;
      color: var(--orange);
      background: var(--orange-soft);
    }

    .status-chip[data-status="pain"].active {
      border-color: #ffc5bd;
      color: var(--red);
      background: var(--red-soft);
    }

    .status-chip[data-status="clear"].active {
      border-color: var(--line);
      color: var(--muted);
      background: #f7f8f5;
    }

    .safety {
      margin-top: 12px;
      padding: 12px;
      border: 1px solid #ffd6d1;
      border-radius: 8px;
      color: var(--red);
      background: var(--red-soft);
      font-size: 14px;
      font-weight: 800;
    }

    .record-grid {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 10px;
      margin-top: 16px;
    }

    .field label,
    .notes label {
      display: block;
      margin-bottom: 6px;
      color: var(--muted);
      font-size: 12px;
      font-weight: 900;
    }

    .field input,
    .notes textarea {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 8px;
      color: var(--ink);
      background: #fff;
    }

    .field input {
      height: 40px;
      padding: 8px 10px;
    }

    .notes {
      margin-top: 12px;
    }

    .notes textarea {
      min-height: 96px;
      padding: 11px;
      resize: vertical;
      line-height: 1.5;
    }

    .record-actions {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-top: 12px;
    }

    dialog {
      width: min(760px, calc(100% - 24px));
      border: 0;
      border-radius: 8px;
      padding: 0;
      background: transparent;
    }

    dialog::backdrop {
      background: rgba(31, 41, 51, 0.42);
      backdrop-filter: blur(4px);
    }

    .modal {
      overflow: hidden;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel);
      box-shadow: var(--shadow);
    }

    .modal-head {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      padding: 16px;
      border-bottom: 1px solid var(--line);
    }

    .modal-head h3 {
      margin: 0;
      font-size: 22px;
    }

    .modal-head p {
      margin: 5px 0 0;
      color: var(--muted);
      font-size: 14px;
    }

    .modal-body {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 14px;
      padding: 16px;
    }

    .exercise-visual {
      display: grid;
      place-items: center;
      overflow: hidden;
      min-height: 230px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: linear-gradient(180deg, #fbfcfa 0%, #f1f5ef 100%);
    }

    .exercise-visual svg {
      display: block;
      width: 100%;
      height: auto;
    }

    .cue-list {
      display: grid;
      gap: 8px;
    }

    .cue {
      padding: 12px;
      border-radius: 8px;
      background: #f7f8f5;
    }

    .cue strong {
      display: block;
      margin-bottom: 5px;
      font-size: 13px;
    }

    .cue p {
      margin: 0;
      color: var(--muted);
      font-size: 14px;
    }

    .record-output {
      width: 100%;
      min-height: 210px;
      padding: 12px;
      border: 1px solid var(--line);
      border-radius: 8px;
      color: var(--ink);
      background: #fbfcfa;
      font: 14px/1.5 ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      resize: vertical;
    }

    .toast {
      position: fixed;
      right: 18px;
      bottom: 18px;
      z-index: 40;
      display: none;
      padding: 12px 14px;
      border-radius: 8px;
      color: #fff;
      background: var(--green);
      box-shadow: var(--shadow);
      font-weight: 900;
    }

    .toast.show {
      display: block;
    }

    .mobile-bottom-bar {
      position: fixed;
      right: 0;
      bottom: 0;
      left: 0;
      z-index: 30;
      display: none;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 8px;
      padding: 10px 12px calc(10px + env(safe-area-inset-bottom));
      border-top: 1px solid rgba(221, 227, 220, 0.95);
      background: rgba(245, 246, 242, 0.96);
      backdrop-filter: blur(14px);
    }

    .mobile-bottom-bar .button {
      min-height: 42px;
      padding: 8px;
      font-size: 13px;
    }

    @media (max-width: 980px) {
      .layout,
      .daily-grid,
      .modal-body {
        grid-template-columns: 1fr;
      }

      .calendar-panel {
        position: static;
      }

      .record-grid {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }
    }

    @media (max-width: 640px) {
      .topbar {
        align-items: flex-start;
        flex-direction: column;
        gap: 10px;
        padding: 10px 12px;
      }

      .top-actions {
        display: grid;
        width: 100%;
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }

      .top-actions .button {
        flex: 1 1 auto;
        min-width: 0;
        white-space: normal;
      }

      .top-actions .button.primary {
        grid-column: 1 / -1;
      }

      .brand-mark {
        width: 32px;
        height: 32px;
      }

      .brand h1 {
        font-size: 16px;
      }

      .brand p {
        display: none;
      }

      main {
        width: min(100% - 18px, 1220px);
        padding-top: 10px;
        padding-bottom: 86px;
      }

      .calendar-panel {
        padding: 12px;
      }

      .panel-title {
        margin-bottom: 10px;
      }

      .panel-title h2 {
        font-size: 17px;
      }

      .panel-title p,
      .calendar-legend {
        display: none;
      }

      .calendar-grid {
        display: flex;
        gap: 8px;
        overflow-x: auto;
        padding: 2px 1px 4px;
        scroll-snap-type: x mandatory;
      }

      .weekday {
        display: none;
      }

      .date-button {
        flex: 0 0 64px;
        min-height: 58px;
        scroll-snap-align: start;
      }

      .date-button span {
        font-size: 10px;
      }

      .day-header {
        grid-template-columns: 1fr;
        gap: 10px;
        padding-bottom: 12px;
      }

      .day-header h2 {
        font-size: 30px;
      }

      .day-header p {
        margin-top: 7px;
        font-size: 14px;
      }

      .status-card {
        min-width: 0;
        padding: 11px;
      }

      .record-grid {
        grid-template-columns: 1fr;
      }

      .day-panel,
      .subpanel {
        padding: 12px;
      }

      .daily-grid {
        gap: 10px;
        margin-top: 10px;
      }

      .food-list li {
        padding: 9px 10px;
        font-size: 13px;
      }

      .exercise-list {
        gap: 9px;
      }

      .exercise-button {
        grid-template-columns: minmax(0, 1fr);
      }

      .exercise-button strong {
        font-size: 16px;
      }

      .exercise-button .sets {
        width: fit-content;
      }

      .status-chips {
        grid-template-columns: repeat(4, minmax(0, 1fr));
      }

      .status-chip {
        min-height: 38px;
      }

      dialog {
        width: min(100% - 16px, 760px);
      }

      .modal-head {
        padding: 12px;
      }

      .modal-body {
        padding: 12px;
      }

      .exercise-visual {
        min-height: 190px;
      }

      .record-actions {
        display: none;
      }

      .mobile-bottom-bar {
        display: grid;
      }
    }
  </style>
</head>
<body>
  <header class="topbar">
    <div class="brand">
      <div class="brand-mark">4W</div>
      <div>
        <h1>4周减脂日历训练台</h1>
        <p>默认今日 · 点日期切换 · 记录会保存在本机浏览器</p>
      </div>
    </div>
    <div class="top-actions">
      <button class="button" type="button" id="todayButton">回到今天</button>
      <a class="button" href="fitness-plan.ics">导入日历</a>
      <button class="button primary" type="button" id="copyDay">复制今日记录</button>
    </div>
  </header>

  <main>
    <div class="layout">
      <aside class="panel calendar-panel">
        <div class="panel-title">
          <div>
            <h2>训练日历</h2>
            <p>2026-06-01 开始，共 4 周。第 2 周起 A/B 自动交替。</p>
          </div>
        </div>
        <div class="calendar-grid" id="calendarGrid" aria-label="4周训练日历"></div>
        <div class="calendar-legend">
          <span class="legend-dot">力量训练</span>
          <span class="legend-dot rest">轻活动/复盘</span>
        </div>
      </aside>

      <section class="panel day-panel" aria-live="polite">
        <div class="day-header">
          <div>
            <p class="date-kicker" id="dateKicker">今日</p>
            <h2 id="dayTitle">加载中</h2>
            <p id="daySummary">正在准备当天计划。</p>
          </div>
          <div class="status-card">
            <label><input type="checkbox" id="doneCheck"> 标记完成</label>
            <p id="savedHint">记录会自动保存在这个浏览器。</p>
          </div>
        </div>

        <div class="daily-grid">
          <article class="subpanel">
            <h3>饮食建议</h3>
            <ul class="food-list" id="foodList"></ul>
            <div class="safety">当天底线：蛋白质优先，甜饮先停。膝盖或腰疼痛超过 3/10，不硬练。</div>
          </article>

          <article class="subpanel">
            <h3>训练计划</h3>
            <div class="exercise-list" id="exerciseList"></div>
          </article>
        </div>

        <section class="subpanel" style="margin-top: 14px;">
          <h3>今日记录</h3>
          <div class="record-grid">
            <div class="field">
              <label for="weightInput">体重 kg</label>
              <input id="weightInput" inputmode="decimal" placeholder="例如 107.0">
            </div>
            <div class="field">
              <label for="stepsInput">步数</label>
              <input id="stepsInput" inputmode="numeric" placeholder="例如 7600">
            </div>
            <div class="field">
              <label for="kneeInput">膝盖疼痛 0-10</label>
              <input id="kneeInput" inputmode="numeric" placeholder="0">
            </div>
            <div class="field">
              <label for="backInput">腰不适 0-10</label>
              <input id="backInput" inputmode="numeric" placeholder="0">
            </div>
          </div>
          <div class="notes">
            <label for="noteInput">备注：跳过了什么、哪台器械不会、饭照情况、加班情况</label>
            <textarea id="noteInput" placeholder="例如：腿举左膝外侧有点紧，跳过；晚饭鸡胸偏少，补了两个鸡蛋。"></textarea>
          </div>
          <div class="record-actions">
            <button class="button primary" type="button" id="saveButton">保存记录</button>
            <button class="button" type="button" id="copySelectedDay">复制这天记录</button>
            <button class="button" type="button" id="exportRecords">备份记录</button>
            <label class="button" for="importRecords">恢复记录</label>
            <input id="importRecords" type="file" accept="application/json" style="display: none;">
            <button class="button warn" type="button" id="clearButton">清空这天</button>
          </div>
        </section>
      </section>
    </div>
  </main>

  <dialog id="exerciseDialog">
    <div class="modal">
      <div class="modal-head">
        <div>
          <h3 id="modalTitle">动作</h3>
          <p id="modalSubtitle">组数</p>
        </div>
        <button class="button" type="button" id="closeDialog">关闭</button>
      </div>
      <div class="modal-body">
        <div class="exercise-visual" id="modalVisual"></div>
        <div class="cue-list" id="modalCues"></div>
      </div>
    </div>
  </dialog>

  <dialog id="recordDialog">
    <div class="modal">
      <div class="modal-head">
        <div>
          <h3>今日记录</h3>

    function formatDate(date) {
      const y = date.getFullYear();
      const m = String(date.getMonth() + 1).padStart(2, "0");
      const d = String(date.getDate()).padStart(2, "0");
      return `${y}-${m}-${d}`;
    }

    function addDays(date, days) {
      const next = new Date(date);
      next.setDate(next.getDate() + days);
      return next;
    }

    function diffDays(date) {
      const a = new Date(date.getFullYear(), date.getMonth(), date.getDate());
      const b = new Date(planStart.getFullYear(), planStart.getMonth(), planStart.getDate());
      return Math.round((a - b) / dayMs);
    }

    function getWorkoutType(index) {
      const week = Math.floor(index / 7);
      const weekday = index % 7;
      const oddWeek = week % 2 === 1;
      if (weekday === 0) return oddWeek ? "B" : "A";
      if (weekday === 2) return oddWeek ? "A" : "B";
      if (weekday === 4) return oddWeek ? "B" : "A";
      return null;
    }

          title: `力量 ${type}`,
          label: `第 ${Math.floor(index / 7) + 1} 周 · ${weekdays[date.getDay()]}`,
          summary: type === "A" ? "胸、背、腿、肩。晚饭前练，练完 20:00 左右吃晚饭。" : "背、肩、臀腿、核心。腰不舒服就减少幅度或跳过动作。",
          exercises: type === "A" ? workoutA : workoutB,
          food: [
            ["午餐", "鸡胸或虾优先；肉不够就补鸡蛋、牛奶、无糖酸奶或高蛋白奶。"],
            ["训练前", "如果饿，吃香蕉、牛奶或无糖酸奶；不要空腹硬练。"],
            ["训练后晚饭", "蛋白质 + 蔬菜 + 半拳到一拳主食，少酱汁，不加夜宵。"]
          ]
        };
      }
      if (weekday === 5) {
        return {
          date,
          key: formatDate(date),
          title: "可选有氧 / 休息",
          label: `第 ${Math.floor(index / 7) + 1} 周 · ${weekdays[date.getDay()]}`,
          summary: "精神好就低强度活动 30-45 分钟，累就休息。",
          exercises: ["walk"],
          food: [
            ["三餐", "维持蛋白质优先，不因为休息日而少吃肉。"],
            ["主食", "正常半拳到一拳，避免晚间零食。"],
            ["补水", "今天重点是恢复，不是加练。"]
          ]
        };
      }
      if (weekday === 6) {
        return {
          date,
          key: formatDate(date),
          title: "周复盘",
          label: `第 ${Math.floor(index / 7) + 1} 周 · ${weekdays[date.getDay()]}`,
          summary: "称体重、量腰围、看本周完成次数和疼痛反馈。",
          exercises: ["review"],
          food: [
            ["复盘", "看 7 日平均体重，不被单日波动影响。"],
            ["准备", "如果下周训练日会加班，提前选替补训练日。"],
            ["发给我", "复制本周记录或今天备注，我帮你调整。"]
          ]
        };
      }
      return {
        date,
        key: formatDate(date),
        title: "轻活动",
        label: `第 ${Math.floor(index / 7) + 1} 周 · ${weekdays[date.getDay()]}`,
        summary: "7000-9000 步，膝盖舒服时可单车或椭圆机 30 分钟。",
        exercises: ["walk"],
        food: [
          ["早餐", "赶不上也可以；别让午餐变成报复性进食。"],
          ["午餐", "轻食肉少就补鸡蛋、牛奶或无糖酸奶。"],
          ["晚饭", "蛋白质和蔬菜先吃，主食半拳到一拳。"]
        ]
      };
    }

    const plans = Array.from({ length: 28 }, (_, index) => getDayPlan(index));
    const todayKey = formatDate(new Date());
    const todayIndex = plans.findIndex((plan) => plan.key === todayKey);
    let selectedIndex = todayIndex >= 0 ? todayIndex : 0;
    let lastRecordText = "";

    const storagePrefix = "fit-bootcamp-v2-";
    const fields = {
      done: document.getElementById("doneCheck"),
      weight: document.getElementById("weightInput"),
      steps: document.getElementById("stepsInput"),
      knee: document.getElementById("kneeInput"),
      back: document.getElementById("backInput"),
      note: document.getElementById("noteInput")
    };

    function readRecord(key) {
      try {
        return JSON.parse(localStorage.getItem(storagePrefix + key) || "{}");
      } catch (error) {
        return {};
      }
    }

    function writeRecord(key, data) {
      localStorage.setItem(storagePrefix + key, JSON.stringify(data));
      document.getElementById("savedHint").textContent = "已保存在当前手机/浏览器。需要换设备时用备份/恢复。";
    }

    function currentRecord() {
      const exerciseStatus = {};
      document.querySelectorAll("[data-status-action].active").forEach((button) => {
        exerciseStatus[button.dataset.exercise] = button.dataset.status;
      });
      return {
        done: fields.done.checked,
        weight: fields.weight.value.trim(),
        steps: fields.steps.value.trim(),
        knee: fields.knee.value.trim(),
        back: fields.back.value.trim(),
        note: fields.note.value.trim(),
        exerciseStatus,
        updatedAt: new Date().toISOString()
      };
    }

    function saveSelected(showMessage = true) {
      const plan = plans[selectedIndex];
      writeRecord(plan.key, currentRecord());
      renderCalendar();
      if (showMessage) showToast("已保存这天记录");
    }

    function renderCalendar() {
      const grid = document.getElementById("calendarGrid");
      grid.innerHTML = "";
      calendarWeekdays.forEach((day) => {
        const div = document.createElement("div");
        div.className = "weekday";
        div.textContent = day;
        grid.appendChild(div);
      });
      plans.forEach((plan, index) => {
        const record = readRecord(plan.key);
        const button = document.createElement("button");
        button.type = "button";
        button.className = "date-button";
        if (plan.key === todayKey) button.classList.add("today");
        if (index === selectedIndex) button.classList.add("selected");
        if (record.done) button.classList.add("done");
        button.innerHTML = `<strong>${plan.date.getDate()}</strong><span>${plan.title}</span>`;
        button.addEventListener("click", () => {
          saveSelected(false);
          selectedIndex = index;
          renderSelectedDay();
        });
        grid.appendChild(button);
      });
    }

    function renderSelectedDay() {
      const plan = plans[selectedIndex];
      const record = readRecord(plan.key);
      document.getElementById("dateKicker").textContent = `${plan.key} · ${plan.label}`;
      document.getElementById("dayTitle").textContent = plan.title;
      document.getElementById("daySummary").textContent = plan.summary;
      document.getElementById("foodList").innerHTML = plan.food.map(([title, text]) => `<li><strong>${title}：</strong>${text}</li>`).join("");
      document.getElementById("exerciseList").innerHTML = plan.exercises.map((id) => {
        const exercise = exercises[id];
        const status = record.exerciseStatus?.[id] || "";
        return `
          <div class="exercise-item" data-exercise-item="${id}">
            <button class="exercise-button" type="button" data-exercise-detail="${id}">
              <span><strong>${exercise.title}</strong><span>${exercise.target} · ${exercise.subtitle}</span></span>
              <span class="sets">${exercise.sets}</span>
            </button>
            <div class="status-chips" aria-label="${exercise.title}记录">
              <button class="status-chip ${status === "done" ? "active" : ""}" type="button" data-status-action data-exercise="${id}" data-status="done">完成</button>
              <button class="status-chip ${status === "skip" ? "active" : ""}" type="button" data-status-action data-exercise="${id}" data-status="skip">跳过</button>
              <button class="status-chip ${status === "pain" ? "active" : ""}" type="button" data-status-action data-exercise="${id}" data-status="pain">疼痛</button>
              <button class="status-chip" type="button" data-status-action data-exercise="${id}" data-status="clear">清除</button>
            </div>
          </div>
        `;
      }).join("");
      fields.done.checked = Boolean(record.done);
      fields.weight.value = record.weight || "";
      fields.steps.value = record.steps || "";
      fields.knee.value = record.knee || "";
      fields.back.value = record.back || "";
      fields.note.value = record.note || "";
      document.querySelectorAll("[data-exercise-detail]").forEach((button) => {
        button.addEventListener("click", () => openExercise(button.dataset.exerciseDetail));
      });
      document.querySelectorAll("[data-status-action]").forEach((button) => {
        button.addEventListener("click", (event) => {
          event.stopPropagation();
          const group = document.querySelectorAll(`[data-status-action][data-exercise="${button.dataset.exercise}"]`);
          group.forEach((item) => item.classList.remove("active"));
          if (button.dataset.status !== "clear") button.classList.add("active");
          saveSelected(false);
        });
      });
      renderCalendar();
    }

    function openExercise(id) {
      const exercise = exercises[id];
      document.getElementById("modalTitle").textContent = exercise.title;
      document.getElementById("modalSubtitle").textContent = `${exercise.sets} · ${exercise.target}`;
      document.getElementById("modalVisual").innerHTML = visuals[id] || "";
      document.getElementById("modalCues").innerHTML = exercise.cues.map(([title, text]) => `
        <div class="cue"><strong>${title}</strong><p>${text}</p></div>
      `).join("");
      document.getElementById("exerciseDialog").showModal();
    }

    function buildRecordText(index = selectedIndex) {
      const plan = plans[index];
      const record = index === selectedIndex ? currentRecord() : readRecord(plan.key);
      const exerciseNames = plan.exercises.map((id) => `${exercises[id].title}（${exercises[id].sets}）`).join("；");
      const statusMap = { done: "完成", skip: "跳过", pain: "疼痛" };
      const exerciseStatus = plan.exercises
        .map((id) => `${exercises[id].title}：${statusMap[record.exerciseStatus?.[id]] || "未标记"}`)
        .join("；");
      return [
        `日期：${plan.key} ${plan.label}`,
        `计划：${plan.title}`,
        `训练内容：${exerciseNames}`,
        `动作记录：${exerciseStatus}`,
        `完成：${record.done ? "是" : "否"}`,
        `体重：${record.weight || ""}`,
        `步数：${record.steps || ""}`,
        `膝盖疼痛：${record.knee || ""}`,
        `腰不适：${record.back || ""}`,
        `备注：${record.note || ""}`
      ].join("\\n");
    }

    async function copyRecord(index = selectedIndex) {
      saveSelected(false);
      const text = buildRecordText(index);
      lastRecordText = text;
      try {
        await navigator.clipboard.writeText(text);
        showToast("已复制记录，可以发给 Codex");
      } catch (error) {
        showRecordDialog(text);
        showToast("自动复制失败，已打开手动复制");
      }
    }

    function showRecordDialog(text) {
      lastRecordText = text;
      const output = document.getElementById("recordOutput");
      output.value = text;
      document.getElementById("recordDialog").showModal();
      window.setTimeout(() => {
        output.focus();
        output.select();
      }, 80);
    }

    const toast = document.getElementById("toast");
    function showToast(text) {
      toast.textContent = text;
      toast.classList.add("show");
      window.setTimeout(() => toast.classList.remove("show"), 1600);
    }

    Object.values(fields).forEach((field) => {
      field.addEventListener("input", () => saveSelected(false));
      field.addEventListener("change", () => saveSelected(false));
    });

    document.getElementById("saveButton").addEventListener("click", () => saveSelected(true));
    document.getElementById("copySelectedDay").addEventListener("click", () => copyRecord(selectedIndex));
    document.getElementById("copyDay").addEventListener("click", () => copyRecord(selectedIndex));
    document.getElementById("mobileSave").addEventListener("click", () => saveSelected(true));
    document.getElementById("mobileCopy").addEventListener("click", () => copyRecord(selectedIndex));
    document.getElementById("mobileNote").addEventListener("click", () => {
      document.getElementById("noteInput").scrollIntoView({ block: "center" });
      document.getElementById("noteInput").focus();
    });
    document.getElementById("todayButton").addEventListener("click", () => {
      saveSelected(false);
      selectedIndex = todayIndex >= 0 ? todayIndex : 0;
      renderSelectedDay();
    });
    document.getElementById("clearButton").addEventListener("click", () => {
      const plan = plans[selectedIndex];
      localStorage.removeItem(storagePrefix + plan.key);
      renderSelectedDay();
      showToast("已清空这天记录");
    });
    document.getElementById("exportRecords").addEventListener("click", () => {
      const records = {};
      plans.forEach((plan) => {
        const record = readRecord(plan.key);
        if (Object.keys(record).length) records[plan.key] = record;
      });
      const blob = new Blob([JSON.stringify({ version: 1, exportedAt: new Date().toISOString(), records }, null, 2)], {
        type: "application/json"
      });
      const link = document.createElement("a");
      link.href = URL.createObjectURL(blob);
      link.download = `fitness-records-${todayKey}.json`;
      link.click();
      URL.revokeObjectURL(link.href);
      showToast("已生成记录备份");
    });
    document.getElementById("importRecords").addEventListener("change", async (event) => {
      const file = event.target.files?.[0];
      if (!file) return;
      try {
        const payload = JSON.parse(await file.text());
        Object.entries(payload.records || {}).forEach(([key, record]) => {
          localStorage.setItem(storagePrefix + key, JSON.stringify(record));
        });
        renderSelectedDay();
        showToast("已恢复记录");
      } catch (error) {
        showToast("恢复失败，文件格式不对");
      } finally {
        event.target.value = "";
      }
    });
    document.getElementById("closeDialog").addEventListener("click", () => {
      document.getElementById("exerciseDialog").close();
    });
    document.getElementById("exerciseDialog").addEventListener("click", (event) => {
      if (event.target.id === "exerciseDialog") event.target.close();
    });
    document.getElementById("closeRecordDialog").addEventListener("click", () => {
      document.getElementById("recordDialog").close();
    });
    document.getElementById("recordDialog").addEventListener("click", (event) => {
      if (event.target.id === "recordDialog") event.target.close();
    });
    document.getElementById("selectRecordText").addEventListener("click", () => {
      const output = document.getElementById("recordOutput");
      output.focus();
      output.select();
      showToast("已选中，长按或复制即可");
    });
    document.getElementById("shareRecordText").addEventListener("click", async () => {
      if (navigator.share) {
        await navigator.share({ text: lastRecordText });
      } else {
        showToast("当前浏览器不支持系统分享");
      }
    });

    renderSelectedDay();
  </script>
</body>
</html>
